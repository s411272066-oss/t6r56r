<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
    }

    .btn-primary {
      background: #38bdf8;
      color: #000;
    }

    .btn-secondary {
      border: 1px solid #38bdf8;
      color: #38bdf8;
    }

    section {
      padding: 60px 20px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="container">
      <h1>Your Name</h1>
      <p>Frontend Developer building clean web experiences</p>

      <a href="#about" class="btn btn-primary">View Work</a>
      <a href="#contact" class="btn btn-secondary">Contact Me</a>
    </div>
  </section>

  <section id="about">
    <div class="container">
      <h2>About</h2>
      <p>
        I build simple, clean, and user-friendly websites.
      </p>
    </div>
  </section>

  <section id="contact">
    <div class="container">
      <h2>Contact</h2>
      <p>Email: you@example.com</p>
      <p>GitHub: github.com/yourname</p>
      <p>LinkedIn: linkedin.com/in/yourname</p>
    </div>
  </section>

  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener("click", function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute("href")).scrollIntoView({
          behavior: "smooth"
        });
      });
    });
  </script>

</body>
</html>
